<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Sfondo scuro (colore della sandbox), angoli arrotondati come un'icona app. -->
  <rect width="32" height="32" rx="7" fill="#0f1622"/>
  <!-- Individuo eterozigote: cerchio tagliato in diagonale, A1 (blu) in alto a
       sinistra, A2 (arancio) in basso a destra — il linguaggio visivo di PopSim. -->
  <defs><clipPath id="c"><circle cx="16" cy="16" r="10.5"/></clipPath></defs>
  <g clip-path="url(#c)">
    <rect x="5.5" y="5.5" width="21" height="21" fill="#4e79a7"/>
    <polygon points="26.5,5.5 26.5,26.5 5.5,26.5" fill="#f28e2b"/>
  </g>
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="#ffffff" stroke-opacity="0.7" stroke-width="1.4"/>
</svg>
